name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: pcov

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build Assets
        run: npm run build

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Tests
        run: ./vendor/bin/pest --coverage-clover=coverage/clover.xml

      - name: Coverage Summary
        if: always()
        run: |
          php -r "
            \$xml = simplexml_load_file('coverage/clover.xml');
            \$metrics = \$xml->project->metrics;
            \$covered = (int)\$metrics['coveredstatements'];
            \$total = (int)\$metrics['statements'];
            \$pct = \$total > 0 ? round(\$covered / \$total * 100, 1) : 0;
            \$bar = str_repeat('█', (int)(\$pct / 5)) . str_repeat('░', 20 - (int)(\$pct / 5));
            echo '## Test Coverage' . PHP_EOL;
            echo '| | |' . PHP_EOL;
            echo '|---|---|' . PHP_EOL;
            echo '| Coverage | \$bar \$pct% |' . PHP_EOL;
            echo '| Statements | \$covered / \$total |' . PHP_EOL;
          " >> \$GITHUB_STEP_SUMMARY
